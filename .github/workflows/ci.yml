name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, build, and visual check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Visual check
        run: |
          npm run preview -- --port 4173 > /tmp/lighting-lab-preview.log 2>&1 &
          preview_pid=$!
          trap "kill $preview_pid" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 1
          done

          VISUAL_CHECK_HEADLESS=false xvfb-run -a npm run visual-check -- http://127.0.0.1:4173/

      - name: Upload visual check screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-check-screenshot
          path: output/playwright/
          if-no-files-found: ignore
