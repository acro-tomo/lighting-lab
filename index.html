<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LDK Lighting Lab — ブラウザで夜の照明を比較する間取り照明シミュレーター</title>
    <meta
      name="description"
      content="間取りを取り込み、照明の位置・明るさ・色温度を変えながら“夜の見え方”をブラウザで比較できる無料ツール。インストール不要。※雰囲気比較用で実照度(lux)は保証しません。"
    />
    <meta name="theme-color" content="#070706" />

    <!-- OGP / Twitter カード（SNSにリンクを貼った時のプレビュー）。
         独自ドメイン取得後は https://ldk-lighting-lab.pages.dev を実URLに差し替えること。
         og:image / og:url は X 等で確実に出すため絶対URLが必要。 -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LDK Lighting Lab" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="LDK Lighting Lab — 夜の照明をブラウザで比較" />
    <meta
      property="og:description"
      content="間取りを取り込み、照明の位置・明るさ・色温度を変えて“夜の見え方”を比較。インストール不要のブラウザ照明シミュレーター。"
    />
    <meta property="og:url" content="https://ldk-lighting-lab.pages.dev/" />
    <meta property="og:image" content="https://ldk-lighting-lab.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LDK Lighting Lab — 夜の照明をブラウザで比較" />
    <meta
      name="twitter:description"
      content="間取りを取り込み、照明の位置・明るさ・色温度を変えて“夜の見え方”を比較。インストール不要のブラウザ照明シミュレーター。"
    />
    <meta name="twitter:image" content="https://ldk-lighting-lab.pages.dev/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
